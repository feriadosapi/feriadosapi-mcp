name: Publish to npm

# Aciona o workflow sempre que uma nova Release for publicada no GitHub
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    # PERMISSÕES OBRIGATÓRIAS PARA OIDC E PROVENANCE
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Release Notes & Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Use Node 20.x ou 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build stdio (npm package)
        run: npm run build:stdio 

      # Publica no npm usando OIDC. 
      # O segredo NPM_TOKEN não é mais necessário!
      - name: Publish package
        run: npm publish --access public --provenance
