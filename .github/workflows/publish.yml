name: Publish to npm

# Aciona o workflow sempre que uma nova Release for publicada no GitHub
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    # PERMISSÕES OBRIGATÓRIAS PARA OIDC E PROVENANCE
    permissions:
      contents: write


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Release Notes & Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x' # Bumped to Node 22 for better NPM OIDC support
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build stdio (npm package)
        run: npm run build:stdio 

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
