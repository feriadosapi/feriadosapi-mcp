name: Release & Publish

on:
  push:
    tags:
      - 'v*' # Dispara quando uma tag começando com 'v' for enviada (ex: v1.0.2)

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para criar a Release no GitHub
      id-token: write # Necessário para assinar o pacote no NPM (OIDC)
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Release Notes & Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # Gera as notas de lançamento automaticamente baseadas nos PRs/Commits

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install dependencies
        run: npm ci

      - name: Build stdio (npm package)
        run: npm run build:stdio

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
